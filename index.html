<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1B3A6E" id="themeColorMeta" />
<title>Recordatorios</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --primary: #1B3A6E;
    --primary-deep: #112754;
    --primary-soft: #E7EEF8;
    --accent: #3B9EE6;
    --accent-deep: #2A7CC0;
    --accent-soft: #DDEFFB;
    --bg: #F1F4FA;
    --surface: #FFFFFF;
    --surface-2: #F7F9FD;
    --text: #0F1B2E;
    --text-soft: #4A5670;
    --text-mute: #8794AC;
    --border: #E4E9F2;
    --shadow: 0 1px 1.5px rgba(15,27,46,0.10);
    --shadow-lg: 0 12px 32px rgba(15,27,46,0.18);
    --danger: #DD3344;
    --radius: 14px;
    --pattern: rgba(27,58,110,0.04);
  }
  html[data-theme="dark"] {
    --primary: #0D1F3A;
    --primary-deep: #07142A;
    --primary-soft: #16263F;
    --accent-soft: #1B3050;
    --bg: #07111F;
    --surface: #121E33;
    --surface-2: #0E1827;
    --text: #E6ECF5;
    --text-soft: #A3B0C7;
    --text-mute: #6B7A95;
    --border: #1F2D47;
    --shadow: 0 1px 2px rgba(0,0,0,0.4);
    --shadow-lg: 0 12px 32px rgba(0,0,0,0.5);
    --pattern: rgba(255,255,255,0.025);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    overscroll-behavior: none;
    transition: background-color .2s, color .2s;
  }
  body {
    display: flex; flex-direction: column;
    max-width: 560px; margin: 0 auto; min-height: 100dvh;
    background-image:
      radial-gradient(circle at 20% 10%, var(--pattern) 0 1.5px, transparent 1.5px),
      radial-gradient(circle at 80% 60%, var(--pattern) 0 1.5px, transparent 1.5px),
      radial-gradient(circle at 40% 80%, var(--pattern) 0 1.5px, transparent 1.5px);
    background-size: 120px 120px, 180px 180px, 90px 90px;
  }
  header.app-header {
    position: sticky; top: 0; z-index: 30;
    background: var(--primary); color: #fff;
    padding: max(env(safe-area-inset-top), 14px) 18px 14px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  header.app-header .brand {
    width: 42px; height: 42px; border-radius: 12px;
    background: #fff; display: grid; place-items: center; overflow: hidden;
    box-shadow: inset 0 -2px 0 rgba(0,0,0,0.05);
  }
  header.app-header h1 { margin: 0; font-size: 19px; font-weight: 800; }
  header.app-header .sub { font-size: 12px; opacity: 0.78; margin-top: 1px; }
  header.app-header .right-icons { margin-left: auto; display: flex; gap: 4px; }
  header.app-header .icon-btn {
    width: 38px; height: 38px; display: grid; place-items: center;
    background: transparent; border: 0; color: #fff; border-radius: 50%; cursor: pointer;
  }
  header.app-header .icon-btn:active { background: rgba(255,255,255,0.12); }
  nav.tabs {
    background: var(--primary); display: flex; color: rgba(255,255,255,0.65);
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    position: sticky; top: 0; z-index: 25;
  }
  nav.tabs button {
    flex: 1; background: transparent; border: 0; color: inherit;
    padding: 12px 8px 11px; font: inherit;
    font-weight: 700; font-size: 14px; cursor: pointer; position: relative;
  }
  nav.tabs button.active { color: #fff; }
  nav.tabs button.active::after {
    content: ''; position: absolute; left: 18%; right: 18%; bottom: 0; height: 3px;
    background: var(--accent); border-radius: 3px 3px 0 0;
  }
  main { flex: 1; padding: 8px 0 96px; position: relative; }
  .empty { text-align: center; padding: 60px 24px; color: var(--text-soft); }
  .empty .ico {
    width: 72px; height: 72px; margin: 0 auto 14px;
    background: var(--accent-soft); color: var(--accent);
    border-radius: 50%; display: grid; place-items: center;
  }
  .empty h2 { margin: 0 0 6px; font-size: 18px; color: var(--text); }
  .empty p { margin: 0; font-size: 14px; line-height: 1.5; }
  .day-label { text-align: center; margin: 16px 0 8px; }
  .day-label span {
    background: var(--surface); color: var(--text-soft);
    padding: 4px 12px; font-size: 12px; font-weight: 600;
    border-radius: 8px; box-shadow: var(--shadow);
  }
  .reminder {
    background: var(--surface); margin: 6px 10px;
    border-radius: var(--radius); padding: 12px 14px 12px 18px;
    box-shadow: var(--shadow); position: relative; cursor: pointer;
    transition: transform .12s ease; overflow: hidden;
  }
  .reminder:active { transform: scale(0.985); }
  .reminder::before {
    content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 5px;
    background: var(--color, var(--accent)); border-radius: 0 4px 4px 0;
  }
  .reminder.done { opacity: 0.55; }
  .reminder.done .r-title { text-decoration: line-through; }
  .r-top { display: flex; align-items: center; gap: 10px; }
  .r-title {
    font-weight: 700; font-size: 15.5px; flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text);
  }
  .r-time { font-size: 12px; color: var(--text-mute); font-weight: 600; white-space: nowrap; }
  .r-time.urgent { color: var(--danger); }
  .r-note {
    font-size: 13.5px; color: var(--text-soft);
    margin-top: 4px; line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .r-meta {
    display: flex; align-items: center; gap: 8px; margin-top: 8px;
    font-size: 11.5px; color: var(--text-mute);
  }
  .r-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 999px; font-weight: 600; font-size: 11px;
  }
  .pri-baja  { background: rgba(59,158,230,0.15); color: var(--accent); }
  .pri-normal{ background: rgba(76,175,80,0.18);  color: #4CAF50; }
  .pri-alta  { background: rgba(221,51,68,0.15);  color: var(--danger); }
  html[data-theme="dark"] .pri-normal { color: #6BD68A; }
  .fab {
    position: fixed; right: max(16px, env(safe-area-inset-right));
    bottom: calc(20px + env(safe-area-inset-bottom));
    width: 60px; height: 60px; border-radius: 50%;
    background: var(--accent); color: #fff; border: 0;
    box-shadow: 0 8px 18px color-mix(in srgb, var(--accent) 50%, transparent), 0 2px 4px rgba(0,0,0,0.15);
    display: grid; place-items: center; cursor: pointer; z-index: 20;
    transition: transform .15s ease;
  }
  .fab:active { transform: scale(0.92); }
  .fab svg { width: 28px; height: 28px; }
  @media (min-width: 560px) { .fab { right: calc(50% - 280px + 16px); } }
  .calendar-wrap { padding: 14px 10px; }
  .cal-head {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); padding: 10px 12px; border-radius: var(--radius);
    box-shadow: var(--shadow); margin-bottom: 10px;
  }
  .cal-head h3 { margin: 0; font-size: 16px; text-transform: capitalize; color: var(--text); }
  .cal-head button {
    background: transparent; border: 0; padding: 6px 12px;
    border-radius: 8px; cursor: pointer; color: var(--accent);
    font-weight: 700; font-size: 18px;
  }
  .cal-head button:active { background: var(--accent-soft); }
  .cal-grid {
    background: var(--surface); border-radius: var(--radius);
    padding: 10px; box-shadow: var(--shadow);
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .cal-grid .dow {
    text-align: center; font-size: 11px; font-weight: 700;
    color: var(--text-mute); padding: 4px 0; text-transform: uppercase;
  }
  .cal-day {
    aspect-ratio: 1; border-radius: 10px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 13.5px; font-weight: 600; color: var(--text); cursor: pointer;
    position: relative; background: transparent; border: 1.5px solid transparent;
  }
  .cal-day.muted { color: var(--text-mute); opacity: .45; }
  .cal-day.today { background: var(--accent-soft); color: var(--accent); }
  .cal-day.selected { border-color: var(--accent); }
  .cal-day .dots { display: flex; gap: 2px; margin-top: 3px; min-height: 5px; }
  .cal-day .dots span { width: 5px; height: 5px; border-radius: 50%; }
  .day-detail { margin-top: 14px; }
  .day-detail h4 {
    margin: 4px 12px 8px; font-size: 14px; color: var(--text-soft);
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .modal-back {
    position: fixed; inset: 0;
    background: rgba(7,17,31,0.55); backdrop-filter: blur(3px);
    display: none; z-index: 50;
    align-items: flex-end; justify-content: center;
  }
  .modal-back.open { display: flex; animation: fadeIn .2s ease; }
  .modal {
    background: var(--surface); width: 100%; max-width: 560px;
    border-radius: 22px 22px 0 0;
    padding: 18px 18px max(20px, env(safe-area-inset-bottom));
    max-height: 92dvh; overflow-y: auto;
    animation: slideUp .25s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes fadeIn { from {opacity:0} to {opacity:1} }
  @keyframes slideUp { from {transform: translateY(40px); opacity:0} to {transform:none; opacity:1} }
  .modal h2 {
    margin: 4px 0 16px; font-size: 19px; font-weight: 800;
    display: flex; align-items: center; gap: 10px; color: var(--text);
  }
  .modal h2 .close {
    margin-left: auto; background: var(--bg); border: 0; width: 34px; height: 34px;
    border-radius: 50%; cursor: pointer; display: grid; place-items: center; color: var(--text-soft);
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 12.5px; font-weight: 700;
    color: var(--text-soft); margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .field input[type=text], .field input[type=date],
  .field input[type=time], .field textarea {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--border); border-radius: 12px;
    font: inherit; font-size: 15px; color: var(--text); background: var(--surface-2);
    outline: none; transition: border-color .15s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 70px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    padding: 8px 14px; border-radius: 999px; border: 1.5px solid var(--border);
    background: var(--surface-2); font: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; color: var(--text-soft);
  }
  .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .chip.pri-baja.active   { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chip.pri-normal.active { background: #4CAF50; border-color: #4CAF50; color: #fff; }
  .chip.pri-alta.active   { background: var(--danger); border-color: var(--danger); color: #fff; }
  .color-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .color-dot {
    width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
    border: 3px solid var(--surface); box-shadow: 0 0 0 1.5px var(--border);
    transition: transform .15s;
  }
  .color-dot.active { transform: scale(1.15); box-shadow: 0 0 0 2.5px var(--text); }
  .actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn {
    flex: 1; padding: 13px; border-radius: 12px; border: 0;
    font: inherit; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:active { background: var(--accent-deep); }
  .btn-ghost { background: var(--bg); color: var(--text); }
  .btn-danger { background: rgba(221,51,68,0.15); color: var(--danger); }
  .toast {
    position: fixed; bottom: calc(96px + env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%);
    background: var(--primary-deep); color: #fff;
    padding: 10px 18px; border-radius: 999px;
    font-size: 14px; font-weight: 600; z-index: 60;
    opacity: 0; transition: opacity .2s, transform .2s;
    pointer-events: none; white-space: nowrap;
    box-shadow: var(--shadow-lg);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .settings { padding: 14px 10px; }
  .set-card {
    background: var(--surface); border-radius: var(--radius); padding: 4px 0;
    box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden;
  }
  .set-row {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .set-row:last-child { border-bottom: 0; }
  .set-row.col { flex-direction: column; align-items: stretch; gap: 12px; }
  .set-row .ico {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent-soft); color: var(--accent);
    display: grid; place-items: center; flex-shrink: 0;
  }
  .set-row .lbl { flex: 1; min-width: 0; }
  .set-row .lbl b { display: block; font-size: 14.5px; font-weight: 700; color: var(--text); }
  .set-row .lbl span { display: block; font-size: 12.5px; color: var(--text-mute); margin-top: 2px; }
  .pill-btn {
    background: var(--primary); color: #fff; border: 0;
    padding: 8px 14px; border-radius: 999px; font: inherit; font-weight: 700;
    font-size: 13px; cursor: pointer;
  }
  .pill-btn.ok { background: #4CAF50; }
  .pill-btn.off { background: var(--bg); color: var(--text-soft); }
  .pill-btn.accent { background: var(--accent); }
  .seg {
    display: flex; background: var(--bg); padding: 4px; border-radius: 999px; gap: 2px;
  }
  .seg button {
    flex: 1; background: transparent; border: 0; padding: 8px 6px;
    font: inherit; font-size: 13px; font-weight: 600; color: var(--text-soft);
    border-radius: 999px; cursor: pointer;
  }
  .seg button.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
  .theme-dot-row { display: flex; gap: 10px; flex-wrap: wrap; padding: 4px 0; align-items: center; }
  .info-banner {
    background: var(--accent-soft); color: var(--accent-deep);
    padding: 10px 14px; border-radius: 10px; font-size: 12.5px; line-height: 1.5;
    margin: 10px 16px 4px;
  }
  html[data-theme="dark"] .info-banner { color: #8FCBF5; }
</style>
</head>
<body>

<header class="app-header">
  <div class="brand" aria-hidden="true">
    <svg viewBox="0 0 640 640" width="30" height="30" xmlns="http://www.w3.org/2000/svg">
      <polygon points="110,520 330,270 550,520" fill="#1B3A6E"/>
      <polygon points="330,270 550,520 340,520" fill="#2D5FA0"/>
      <polygon points="245,520 330,270 330,520" fill="#3B9EE6"/>
      <polygon points="280,180 380,230 330,270" fill="#1B3A6E"/>
      <polygon points="280,180 340,215 305,240" fill="#3B9EE6"/>
      <polygon points="345,218 590,240 380,250" fill="#1B3A6E"/>
      <polygon points="380,250 590,240 425,290" fill="#2D5FA0"/>
      <circle cx="318" cy="218" r="11" fill="#0F1932"/>

    <button class="icon-btn" id="quickTheme" title="Cambiar tema">
      <svg id="themeIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>

<nav class="tabs">

<main id="main"></main>

<button class="fab" id="fabAdd" aria-label="Nuevo recordatorio">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<div class="modal-back" id="modalBack"><div class="modal" id="modal"></div></div>

<script>
const Storage = (() => {
  let mem = {};
  function get(key, def) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }
    catch { return mem[key] ?? def; }
  }
  function set(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch { mem[key] = val; }
  }
  return { get, set };
})();

const PRESET_ACCENTS = [
  { name:'Pelícano',  c:'#3B9EE6' },
  { name:'Marino',    c:'#1B3A6E' },
  { name:'Verde',     c:'#2BB673' },
  { name:'Coral',     c:'#FF6B6B' },
  { name:'Violeta',   c:'#8B5CF6' },
  { name:'Ámbar',     c:'#F59E0B' },
  { name:'Rosa',      c:'#EC4899' },
  { name:'Turquesa',  c:'#14B8A6' },
];

const Prefs = {
  load() {
    return {
      theme:  Storage.get('pref.theme',  'auto'),
      accent: Storage.get('pref.accent', '#3B9EE6'),
    };
  },
  save(p) { Storage.set('pref.theme', p.theme); Storage.set('pref.accent', p.accent); },
};

function effectiveTheme(p) {
  if (p.theme === 'auto') {
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  return p.theme;
}
function applyTheme() {
  const p = Prefs.load();
  const eff = effectiveTheme(p);
  document.documentElement.setAttribute('data-theme', eff);
  const a = p.accent;
  document.documentElement.style.setProperty('--accent', a);
  document.documentElement.style.setProperty('--accent-deep', shade(a, -20));
  document.documentElement.style.setProperty('--accent-soft', eff === 'dark' ? shade(a, -55) : shade(a, 70));
  document.getElementById('themeColorMeta').setAttribute('content', eff === 'dark' ? '#0D1F3A' : '#1B3A6E');
  const ic = document.getElementById('themeIcon');
  if (eff === 'dark') {
    ic.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  } else {
    ic.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>';
  }
}
function shade(hex, percent) {
  const h = hex.replace('#','');
  let r = parseInt(h.substring(0,2),16);
  let g = parseInt(h.substring(2,4),16);
  let b = parseInt(h.substring(4,6),16);
  r = Math.max(0, Math.min(255, r + Math.round(255 * percent/100)));
  g = Math.max(0, Math.min(255, g + Math.round(255 * percent/100)));
  b = Math.max(0, Math.min(255, b + Math.round(255 * percent/100)));
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (Prefs.load().theme === 'auto') applyTheme();
});

const state = {
  reminders: Storage.get('reminders_v1', []),
  tab: 'list',
  editing: null,
  calMonth: new Date(),
  selectedDay: null,
  timers: new Map(),
};
function saveReminders() { Storage.set('reminders_v1', state.reminders); }

const COLORS = ['#3B9EE6','#1B3A6E','#2BB673','#F59E0B','#EF4444','#A855F7','#0EA5E9','#EC4899'];
const PRIORITIES = [
  {id:'baja',   label:'Baja'},
  {id:'normal', label:'Normal'},
  {id:'alta',   label:'Alta'},
];

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmtDate(d) { return new Date(d).toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'}); }
function fmtTime(d) { return new Date(d).toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'}); }
function sameDay(a, b) {
  a = new Date(a); b = new Date(b);
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function relTime(when) {
  const diff = new Date(when).getTime() - Date.now();
  const abs = Math.abs(diff);
  const min = Math.round(abs / 60000);
  const hr = Math.round(abs / 3600000);
  const day = Math.round(abs / 86400000);
  if (diff < 0) {
    if (min < 1) return 'hace un momento';
    if (min < 60) return `hace ${min} min`;
    if (hr < 24) return `hace ${hr} h`;
    return `hace ${day} d`;
  }
  if (min < 1) return 'ahora';
  if (min < 60) return `en ${min} min`;
  if (hr < 24) return `en ${hr} h`;
  return `en ${day} d`;
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=> el.classList.remove('show'), 2400);
}
function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const Notif = {
  swReg: null,
  perm() { return 'Notification' in window ? Notification.permission : 'unsupported'; },
  async init() {
    if (!('serviceWorker' in navigator)) return;
    try { this.swReg = await navigator.serviceWorker.ready; } catch (e) {}
  },
  async request() {
    if (!('Notification' in window)) { toast('Este navegador no soporta notificaciones'); return false; }
    if (Notification.permission === 'granted') return true;
    if (Notification.permission === 'denied') {
      toast('Permisos bloqueados. Actívalos en ajustes del navegador.');
      return false;
    }
    const r = await Notification.requestPermission();
    return r === 'granted';
  },
  async show(r) {
    if (this.perm() !== 'granted') return false;
    const options = {
      body: r.note || `Recordatorio: ${r.title}`,
      icon: 'icon-192.png',
      badge: 'icon-192.png',
      tag: r.id,
      vibrate: [200, 100, 200],
      requireInteraction: r.priority === 'alta',
      data: { id: r.id, when: r.when },
    };
    if (this.swReg && this.swReg.showNotification) {
      try { await this.swReg.showNotification(r.title, options); return true; }
      catch(e) { console.warn('SW notif failed, fallback', e); }
    }
    try {
      const n = new Notification(r.title, options);
      n.onclick = () => { window.focus(); n.close(); };
      return true;
    } catch(e) { return false; }
  },
  async test() {
    const ok = await this.request();
    if (!ok) return;
    const success = await this.show({
      id: 'test-'+Date.now(),
      title: '🔔 Notificación de prueba',
      note: 'Si ves esto, las notificaciones funcionan correctamente.',
      priority: 'normal',
    });
    if (success) toast('Notificación enviada');
    else toast('No se pudo mostrar la notificación');
  },
};

function clearTimers() {
  state.timers.forEach(id => clearTimeout(id));
  state.timers.clear();
}
function rescheduleAll() {
  clearTimers();
  const now = Date.now();
  state.reminders.forEach(r => {
    if (r.done || r.fired) return;
    const when = new Date(r.when).getTime();
    const delay = when - now;
    if (delay <= 0 && delay > -120000) {
      triggerReminder(r.id);
    } else if (delay > 0 && delay < 24*3600*1000) {
      const tid = setTimeout(() => triggerReminder(r.id), delay);
      state.timers.set(r.id, tid);
    }
  });
}
async function triggerReminder(id) {
  const r = state.reminders.find(x => x.id === id);
  if (!r || r.done) return;
  await Notif.show(r);
  r.fired = true;
  saveReminders();
  render();
}
setInterval(() => {
  const now = Date.now();
  let changed = false;
  state.reminders.forEach(async (r) => {
    if (!r.done && !r.fired && new Date(r.when).getTime() <= now) {
      await Notif.show(r);
      r.fired = true;
      changed = true;
    }
  });
  if (changed) { saveReminders(); render(); }
}, 30000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) rescheduleAll(); });

function render() {
  document.querySelectorAll('nav.tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === state.tab);
  });
  const main = document.getElementById('main');
  if (state.tab === 'list') renderList(main);
  else if (state.tab === 'calendar') renderCalendar(main);
  else renderSettings(main);
  const pending = state.reminders.filter(r => !r.done && new Date(r.when).getTime() > Date.now()).length;
  document.getElementById('sub').textContent =
    pending === 0 ? 'Sin recordatorios pendientes' :
    pending === 1 ? '1 recordatorio pendiente' :
    `${pending} recordatorios pendientes`;
}

function renderList(main) {
  const list = [...state.reminders].sort((a,b) => new Date(a.when) - new Date(b.when));
  if (list.length === 0) {
    main.innerHTML = `
      <div class="empty">
        <div class="ico"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
        <h2>Aún no hay recordatorios</h2>
        <p>Pulsa el botón <strong>+</strong> para crear el primero.</p>
      </div>`;
    return;
  }
  const groups = {};
  list.forEach(r => {
    const key = new Date(r.when).toDateString();
    (groups[key] = groups[key] || []).push(r);
  });
  let html = '';
  Object.entries(groups).forEach(([key, items]) => {
    const d = new Date(key);
    let label = fmtDate(d);
    if (sameDay(d, new Date())) label = 'Hoy · ' + label;
    else if (sameDay(d, new Date(Date.now()+86400000))) label = 'Mañana · ' + label;
    html += `<div class="day-label"><span>${label}</span></div>`;
    items.forEach(r => html += cardHTML(r));
  });
  main.innerHTML = html;
  main.querySelectorAll('.reminder').forEach(el => {
    el.addEventListener('click', () => openModal(el.dataset.id));
  });
}
function cardHTML(r) {
  const isPast = new Date(r.when).getTime() < Date.now();
  const urgent = !r.done && !isPast && (new Date(r.when).getTime() - Date.now()) < 3600000;
  const priLabel = PRIORITIES.find(p => p.id === r.priority)?.label || 'Normal';
  return `
    <div class="reminder ${r.done ? 'done' : ''}" data-id="${r.id}" style="--color:${r.color || '#3B9EE6'}">
      <div class="r-top">
        <div class="r-title">${escapeHTML(r.title)}</div>
        <div class="r-time ${urgent?'urgent':''}">${fmtTime(r.when)}</div>
      </div>
      ${r.note ? `<div class="r-note">${escapeHTML(r.note)}</div>` : ''}
      <div class="r-meta">
        <span class="r-badge pri-${r.priority}">● ${priLabel}</span>
        <span>${relTime(r.when)}</span>
        ${r.done ? '<span>· hecho</span>' : ''}
      </div>
    </div>`;
}

function renderCalendar(main) {
  const d = state.calMonth;
  const year = d.getFullYear(), month = d.getMonth();
  const monthName = d.toLocaleDateString('es-ES', {month:'long', year:'numeric'});
  const first = new Date(year, month, 1);
  const startWeekday = (first.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const prevMonthDays = new Date(year, month, 0).getDate();
  const dows = ['Lu','Ma','Mi','Ju','Vi','Sá','Do'];
  let html = `
    <div class="calendar-wrap">
      <div class="cal-head">
        <button id="prevM">‹</button>
        <h3>${monthName}</h3>
        <button id="nextM">›</button>
      </div>
      <div class="cal-grid">
        ${dows.map(x => `<div class="dow">${x}</div>`).join('')}`;
  for (let i = startWeekday - 1; i >= 0; i--) html += `<div class="cal-day muted">${prevMonthDays - i}</div>`;
  const today = new Date();
  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(year, month, day);
    const isToday = sameDay(date, today);
    const isSelected = state.selectedDay && sameDay(date, state.selectedDay);
    const dayReminders = state.reminders.filter(r => sameDay(r.when, date));
    const dotColors = [...new Set(dayReminders.map(r => r.color || '#3B9EE6'))].slice(0,3);
    html += `
      <div class="cal-day ${isToday?'today':''} ${isSelected?'selected':''}" data-day="${day}">
        ${day}
        <div class="dots">${dotColors.map(c => `<span style="background:${c}"></span>`).join('')}</div>
      </div>`;
  }
  const total = startWeekday + daysInMonth;
  const trailing = (7 - total % 7) % 7;
  for (let i = 1; i <= trailing; i++) html += `<div class="cal-day muted">${i}</div>`;
  html += `</div>`;
  if (state.selectedDay) {
    const dayList = state.reminders
      .filter(r => sameDay(r.when, state.selectedDay))
      .sort((a,b) => new Date(a.when) - new Date(b.when));
    html += `<div class="day-detail"><h4>${fmtDate(state.selectedDay)}</h4>`;
    if (dayList.length === 0) html += `<div class="empty" style="padding:30px 20px"><p>Sin recordatorios este día.</p></div>`;
    else dayList.forEach(r => html += cardHTML(r));
    html += `</div>`;
  }
  html += `</div>`;
  main.innerHTML = html;
  document.getElementById('prevM').onclick = () => { state.calMonth = new Date(year, month-1, 1); render(); };
  document.getElementById('nextM').onclick = () => { state.calMonth = new Date(year, month+1, 1); render(); };
  main.querySelectorAll('.cal-day[data-day]').forEach(el => {
    el.onclick = () => { state.selectedDay = new Date(year, month, +el.dataset.day); render(); };
  });
  main.querySelectorAll('.reminder').forEach(el => {
    el.addEventListener('click', () => openModal(el.dataset.id));
  });
}

            <div class="ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg></div>

            <button data-th="auto"  class="${p.theme==='auto'?'active':''}">Auto</button>

            <div class="lbl"><b>Color principal</b><span>Acentos y botón flotante</span></div>
          </div>
          <div class="theme-dot-row">
            ${PRESET_ACCENTS.map(a => `<div class="color-dot ${p.accent===a.c?'active':''}" data-accent="${a.c}" style="background:${a.c}" title="${a.name}"></div>`).join('')}
            <label style="display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--text-soft);cursor:pointer">
              <input type="color" id="customAccent" value="${p.accent}" style="width:34px;height:34px;border:0;background:none;cursor:pointer;padding:0">
              Personal
            </label>
          </div>
        </div>
      </div>

      <div class="set-card">
        <div class="set-row">
          <div class="ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg></div>

          <div class="ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
          <div class="lbl"><b>Exportar copia</b><span>Descarga tus recordatorios como JSON</span></div>
          <button class="pill-btn" id="btnExport">Exportar</button>
        </div>
        <div class="set-row">
          <div class="ico" style="background:rgba(221,51,68,0.15);color:#DD3344"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div>
          <div class="lbl"><b>Borrar todo</b><span>Elimina todos los recordatorios</span></div>
          <button class="pill-btn" style="background:rgba(221,51,68,0.15);color:#DD3344" id="btnWipe">Borrar</button>
        </div>
      </div>

      <div class="set-card">
        <div class="set-row">
          <div class="ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg></div>

  document.getElementById('btnPerm').onclick = async () => {

    if (ok) toast('Notificaciones activadas');
    render();

  document.getElementById('segTheme').querySelectorAll('button').forEach(b => {
    b.onclick = () => {
      const pr = Prefs.load(); pr.theme = b.dataset.th; Prefs.save(pr);
      applyTheme(); render();
    };
  });
  document.querySelectorAll('[data-accent]').forEach(el => {
    el.onclick = () => {
      const pr = Prefs.load(); pr.accent = el.dataset.accent; Prefs.save(pr);
      applyTheme(); render();
    };
  });
  document.getElementById('customAccent').oninput = (e) => {
    const pr = Prefs.load(); pr.accent = e.target.value; Prefs.save(pr); applyTheme();
  };
  document.getElementById('btnExport').onclick = () => {
    const data = JSON.stringify(state.reminders, null, 2);
    const blob = new Blob([data], {type:'application/json'});

    if (confirm('¿Borrar todos los recordatorios? Esta acción no se puede deshacer.')) {
      state.reminders = []; saveReminders(); clearTimers(); toast('Todo borrado'); render();

}

function openModal(id) {
  const isEdit = !!id;
  const r = isEdit
    ? state.reminders.find(x => x.id === id)
    : { id: uid(), title:'', when: defaultWhen(), priority:'normal', color: COLORS[0], note:'', done:false, fired:false };
  state.editing = { ...r };
  const dt = new Date(state.editing.when);
  const tzOffset = dt.getTimezoneOffset() * 60000;
  const local = new Date(dt.getTime() - tzOffset).toISOString().slice(0,16);
  const dateStr = local.slice(0,10);
  const timeStr = local.slice(11,16);

  document.getElementById('modal').innerHTML = `
    <h2>
      ${isEdit ? 'Editar recordatorio' : 'Nuevo recordatorio'}
      <button class="close" id="closeModal" aria-label="Cerrar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </h2>
    <div class="field">
      <label>Título</label>
      <input type="text" id="fTitle" maxlength="80" placeholder="Ej. Llamar al médico" value="${escapeHTML(state.editing.title)}" />
    </div>
    <div class="field row2">
      <div><label>Fecha</label><input type="date" id="fDate" value="${dateStr}" /></div>
      <div><label>Hora</label><input type="time" id="fTime" value="${timeStr}" /></div>
    </div>
    <div class="field">
      <label>Importancia</label>
      <div class="chip-row" id="chPriority">
        ${PRIORITIES.map(p => `<button class="chip pri-${p.id} ${state.editing.priority===p.id?'active':''}" data-pri="${p.id}">${p.label}</button>`).join('')}
      </div>
    </div>
    <div class="field">
      <label>Color del aviso</label>
      <div class="color-row" id="chColor">
        ${COLORS.map(c => `<div class="color-dot ${state.editing.color===c?'active':''}" data-color="${c}" style="background:${c}"></div>`).join('')}
      </div>
    </div>
    <div class="field">
      <label>Nota (opcional)</label>
      <textarea id="fNote" placeholder="Detalles adicionales…">${escapeHTML(state.editing.note || '')}</textarea>
    </div>
    <div class="actions">
      ${isEdit ? `<button class="btn btn-danger" id="bDel">Eliminar</button><button class="btn btn-ghost" id="bDone">${state.editing.done?'Reactivar':'Hecho'}</button>` : `<button class="btn btn-ghost" id="bCancel">Cancelar</button>`}
      <button class="btn btn-primary" id="bSave">Guardar</button>
    </div>
  `;
  document.getElementById('modalBack').classList.add('open');
  document.getElementById('closeModal').onclick = closeModal;
  document.getElementById('modalBack').onclick = (e) => { if (e.target.id === 'modalBack') closeModal(); };
  document.querySelectorAll('#chPriority .chip').forEach(c => {
    c.onclick = () => {
      state.editing.priority = c.dataset.pri;
      document.querySelectorAll('#chPriority .chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
    };
  });
  document.querySelectorAll('#chColor .color-dot').forEach(c => {
    c.onclick = () => {
      state.editing.color = c.dataset.color;
      document.querySelectorAll('#chColor .color-dot').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
    };
  });
  document.getElementById('bSave').onclick = saveFromForm;
  if (isEdit) {
    document.getElementById('bDel').onclick = () => {
      if (confirm('¿Eliminar este recordatorio?')) {
        state.reminders = state.reminders.filter(x => x.id !== id);
        saveReminders(); rescheduleAll(); closeModal(); toast('Eliminado'); render();
      }
    };
    document.getElementById('bDone').onclick = () => {
      const r2 = state.reminders.find(x => x.id === id);
      r2.done = !r2.done;
      saveReminders(); rescheduleAll(); closeModal();
      toast(r2.done ? 'Marcado como hecho' : 'Reactivado'); render();
    };
  } else {
    document.getElementById('bCancel').onclick = closeModal;
  }
}
function defaultWhen() {
  const d = new Date();
  d.setMinutes(d.getMinutes() + 60);
  d.setSeconds(0, 0);
  return d.toISOString();
}
function saveFromForm() {
  const title = document.getElementById('fTitle').value.trim();
  const date = document.getElementById('fDate').value;
  const time = document.getElementById('fTime').value;
  const note = document.getElementById('fNote').value.trim();
  if (!title) { toast('Falta el título'); return; }
  if (!date || !time) { toast('Falta fecha u hora'); return; }
  const when = new Date(`${date}T${time}`).toISOString();
  const existing = state.reminders.find(x => x.id === state.editing.id);
  const newR = {
    id: state.editing.id, title, when, note,
    priority: state.editing.priority, color: state.editing.color,
    done: existing ? existing.done : false, fired: false,
  };
  if (existing) Object.assign(existing, newR);
  else state.reminders.push(newR);
  saveReminders(); rescheduleAll(); closeModal();
  toast(existing ? 'Actualizado' : 'Creado');
  if (Notif.perm() === 'default') Notif.request();
  render();
}
function closeModal() {
  document.getElementById('modalBack').classList.remove('open');
  state.editing = null;
}

document.querySelectorAll('nav.tabs button').forEach(b => {
  b.onclick = () => { state.tab = b.dataset.tab; render(); };
});
document.getElementById('fabAdd').onclick = () => openModal(null);
document.getElementById('quickTheme').onclick = () => {
  const p = Prefs.load();
  const cur = effectiveTheme(p);
  p.theme = cur === 'dark' ? 'light' : 'dark';
  Prefs.save(p); applyTheme(); render();
};

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try { await navigator.serviceWorker.register('sw.js'); } catch(e) {}
    await Notif.init();
  });
}

applyTheme();
rescheduleAll();
render();
</script>
